services:
  postgresql:
    image: postgres:15
    container_name: oas-postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oas123456}
      POSTGRES_DB: ${POSTGRES_DB:-oas}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - oas-net

  redis:
    image: redis:7-alpine
    container_name: oas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-oas123456}
    volumes:
      - redisdata:/data
    networks:
      - oas-net

  minio:
    image: minio/minio:latest
    container_name: oas-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioAdmin.!@#}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - oas-net

  minio-init:
    image: minio/mc:latest
    container_name: oas-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set oas http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioAdmin.!@#};
      mc mb --ignore-existing oas/main;
      mc mb --ignore-existing oas/thumb;
      mc anonymous set download oas/main;
      mc anonymous set download oas/thumb;
      echo 'MinIO buckets created successfully';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioAdmin.!@#}
    networks:
      - oas-net

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: oas-onlyoffice
    restart: unless-stopped
    ports:
      - "28080:80"
    environment:
      JWT_ENABLED: ${JWT_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_IN_BODY: ${JWT_IN_BODY:-false}
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
    networks:
      - oas-net

volumes:
  pgdata:
  redisdata:
  miniodata:
  onlyoffice_data:
  onlyoffice_log:

networks:
  oas-net:
    driver: bridge
